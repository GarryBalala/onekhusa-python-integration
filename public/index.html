<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneTicket Fintech | Python Reference</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Socket.io Client (Compatible with python-socketio) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scale-up { animation: scaleUp 0.4s ease-out forwards; }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900">

    <!-- 1. VERIFICATION OVERLAY (Shows when returning from OneKhusa) -->
    <div id="verify-overlay" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl text-center max-w-sm w-full scale-up">
            <div id="verify-icon" class="text-blue-600 text-6xl mb-6 flex justify-center">
                 <i data-lucide="loader-2" class="w-16 h-16 animate-spin"></i>
            </div>
            <h2 id="verify-title" class="text-2xl font-black text-slate-800">Verifying Payment</h2>
            <p id="verify-msg" class="text-slate-500 mt-2">Checking with OneKhusa... Please wait.</p>
        </div>
    </div>

    <div id="app" class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12">
            <h1 class="text-3xl font-black text-blue-700 uppercase tracking-tighter">
                ONETICKET <span class="text-slate-300 font-light italic text-xl">FINTECH</span>
            </h1>
            <div class="bg-yellow-100 text-yellow-700 px-4 py-1 rounded-full text-xs font-bold mt-4 md:mt-0 flex items-center gap-2 border border-yellow-200">
                <span class="w-2 h-2 bg-yellow-600 rounded-full animate-pulse"></span> PYTHON FASTAPI
            </div>
        </header>

        <main>
            <!-- Success Screen -->
            <div id="view-success" class="hidden bg-white p-16 rounded-[3rem] border shadow-2xl text-center scale-up">
                <i data-lucide="party-popper" class="mx-auto text-emerald-500 mb-6 w-24 h-24"></i>
                <h2 class="text-4xl font-black mb-4">Payment Verified!</h2>
                <p class="mb-8 text-slate-500 text-lg">Your Python-powered transaction was successful.</p>
                <button onclick="location.href='/'" class="bg-blue-600 text-white px-12 py-4 rounded-[2rem] font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    Buy Another Ticket
                </button>
            </div>

            <!-- Purchase View -->
            <div id="view-purchase" class="max-w-xl mx-auto space-y-6">
                <div class="bg-white p-10 rounded-[3rem] border shadow-sm text-center">
                    <i data-lucide="ticket" class="mx-auto text-blue-600 mb-4 opacity-20 w-16 h-16"></i>
                    <h2 class="text-2xl font-bold mb-2 text-slate-400">Python Showcase Entry</h2>
                    <p class="text-5xl font-black mb-10 text-slate-800">MWK 2,500</p>
                    
                    <button id="buyBtn" onclick="handleBuy()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl flex justify-center items-center gap-3 hover:bg-blue-600 transition disabled:opacity-50 shadow-xl">
                        <i data-lucide="credit-card"></i>
                        <span id="buyBtnText">PURCHASE TICKET</span>
                    </button>
                </div>
            </div>
        </main>

        <footer class="mt-20 text-center text-slate-400 text-[10px] uppercase tracking-[0.2em] font-bold">
            OneKhusa Python SDK Reference &copy; 2026
        </footer>
    </div>

    <script>
        // Connect to the Socket.io server running on FastAPI
        const socket = io();
        
        // Handle Return from OneKhusa Checkout
        const urlParams = new URLSearchParams(window.location.search);
        const refFromUrl = urlParams.get('ref');

        if (refFromUrl) {
            document.getElementById('verify-overlay').classList.remove('hidden');
            lucide.createIcons();
            checkPaymentStatus(refFromUrl);
        }

        /**
         * Step 1: Initiate Payment via Python Backend
         */
        async function handleBuy() {
            const btn = document.getElementById('buyBtn');
            const btnText = document.getElementById('buyBtnText');
            btn.disabled = true;
            btnText.innerText = "REDIRECTING...";

            try {
                // Calls the FastAPI endpoint we created
                const response = await fetch('/api/Tickets/buy/showcase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Redirect browser to OneKhusa Hosted Checkout
                    window.location.href = result.redirectUrl;
                } else {
                    alert("Error: " + result.message);
                    resetButton();
                }
            } catch (error) {
                alert("Connection failed. Check if Python server is running.");
                resetButton();
            }
        }

        /**
         * Step 2: Verification Logic (Socket or Polling)
         */
        socket.on('webhook_received', (data) => {
            console.log("Real-time Webhook Received:", data);
            if (data.reference === refFromUrl && data.status === 'Paid') {
                showFinalSuccess();
            }
        });

        async function checkPaymentStatus(ref) {
            try {
                const res = await fetch(`/api/Tickets/status/${ref}`);
                const data = await res.json();
                if (data.status === "Paid") {
                    showFinalSuccess();
                } else {
                    // Poll Python API every 3 seconds as fallback
                    setTimeout(() => checkPaymentStatus(ref), 3000);
                }
            } catch (e) {
                setTimeout(() => checkPaymentStatus(ref), 5000);
            }
        }

        function showFinalSuccess() {
            const icon = document.getElementById('verify-icon');
            icon.classList.remove('animate-spin');
            icon.innerHTML = '<i data-lucide="check-circle" class="w-16 h-16 text-emerald-500"></i>';
            document.getElementById('verify-title').innerText = "Payment Confirmed!";
            document.getElementById('verify-msg').innerText = "Redirecting you back to dashboard...";
            lucide.createIcons();

            setTimeout(() => {
                document.getElementById('verify-overlay').classList.add('hidden');
                document.getElementById('view-purchase').classList.add('hidden');
                document.getElementById('view-success').classList.remove('hidden');
                // Clean the URL ref parameter
                window.history.replaceState({}, document.title, "/");
            }, 2500);
        }

        function resetButton() {
            const btn = document.getElementById('buyBtn');
            const btnText = document.getElementById('buyBtnText');
            btn.disabled = false;
            btnText.innerText = "PURCHASE TICKET";
        }

        lucide.createIcons();
    </script>
</body>
</html>
